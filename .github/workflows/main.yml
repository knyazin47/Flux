name: Generate Daily Questions

on:
  schedule:
    - cron: '43 2 * * *'   # 06:00 UTC = 09:00 Minsk (UTC+3)
  workflow_dispatch:        # allow manual trigger from GitHub UI

# Prevent parallel runs — only one generation at a time
concurrency:
  group: daily-questions
  cancel-in-progress: false

# Least-privilege token: only write to repository contents
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Restore Claude auth (OAuth)
        env:
          CLAUDE_AUTH_JSON: ${{ secrets.CLAUDE_AUTH_JSON }}
          CLAUDE_CREDENTIALS_JSON: ${{ secrets.CLAUDE_CREDENTIALS_JSON }}
        run: |
          printf '%s' "$CLAUDE_AUTH_JSON" > ~/.claude.json
          chmod 600 ~/.claude.json
          mkdir -p ~/.claude
          printf '%s' "$CLAUDE_CREDENTIALS_JSON" > ~/.claude/.credentials.json
          chmod 600 ~/.claude/.credentials.json

      - name: Verify Claude auth
        run: |
          claude --version
          claude auth status --text

      - name: Generate questions
        run: node scripts/generate-daily.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/daily-questions.json
          git diff --staged --quiet || git commit -m "chore: update daily questions [skip ci]"
          git pull --rebase origin main
          git push
