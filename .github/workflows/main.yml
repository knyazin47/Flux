name: Generate Daily Questions

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC = 09:00 Minsk
  workflow_dispatch:       # allow manual run

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Restore Claude auth (OAuth)
        env:
          CLAUDE_AUTH_JSON: ${{ secrets.CLAUDE_AUTH_JSON }}
        run: |
          printf '%s' "$CLAUDE_AUTH_JSON" > ~/.claude.json
          chmod 600 ~/.claude.json

      - name: Generate questions
        run: node scripts/generate-daily.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/daily-questions.json
          git diff --staged --quiet || git commit -m "chore: update daily questions [skip ci]"
          git push
