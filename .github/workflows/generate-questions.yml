name: Generate Daily Questions

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC = 09:00 Минск
  workflow_dispatch:        # ручной запуск из GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Restore Claude auth (OAuth)
        run: |
          echo '${{ secrets.CLAUDE_AUTH_JSON }}' > ~/.claude.json
          chmod 600 ~/.claude.json

      - name: Generate questions
        run: node scripts/generate-daily.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/daily-questions.json
          git diff --staged --quiet || git commit -m "chore: daily questions $(date -u +%Y-%m-%d)"
          git push
